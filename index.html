<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiveCloud Dashboards</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#e4e7ef;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{text-align:center;max-width:600px;padding:40px}
h1{font-size:28px;margin-bottom:8px}
h1 span{color:#818cf8}
p.sub{color:#8b90a0;margin-bottom:40px}
.cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.card{background:#1a1d27;border:1px solid #2e3345;border-radius:12px;padding:32px 24px;width:260px;text-decoration:none;color:#e4e7ef;transition:all .2s}
.card:hover{border-color:#6366f1;transform:translateY(-2px)}
.card h2{font-size:18px;margin-bottom:8px}
.card p{font-size:14px;color:#8b90a0}
.emoji{font-size:36px;margin-bottom:16px}
</style>
</head>
<body>
<div class="container">
<h1>LiveCloud <span>Dashboards</span></h1>
<p class="sub">Ringsted Festival 2026</p>
<div class="cards">
<a class="card" href="timeline.html"><div class="emoji">📊</div><h2>Roadmap Timeline</h2><p>Sprint-oversigt, kapacitet, workstreams og milestones</p></a>
</div>
</div>
</body>
</html>
