name: Sync Jira -> Timeline

on:
  schedule:
    - cron: '*/15 5-21 * * 1-5'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['timeline.html', 'sync-jira-timeline.mjs', '.github/workflows/sync-timeline.yml']

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Sync from Jira
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: node sync-jira-timeline.mjs
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || (git commit -m "chore: sync timeline data from Jira [skip ci]" && git push)
